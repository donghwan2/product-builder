<!DOCTYPE html>
<html lang="ko">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추천기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <h1>로또 번호 추천</h1>

    </div>
    <script src="main.js"></script>
</body>
